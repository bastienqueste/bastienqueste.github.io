categories:
  - items: 
    - header: PhD studentships
    
    - subtitle: None availabe at the moment.
      description: >
        New positions are advertised here when funding is availabe.
      
  - items:
    - header: BSc and MSc projects
    
    - description: >
        We have a range of projects available spanning physical oceanography to biogeochemistry.  
        We can accomodate 15 or 30 hp project for BSc; while we prefer 60 hp projects for MSc as this allows deeper, more interesting research avenues.<br>
        
        We currently have datasets from the Arabian Sea, Baltic Sea and Arabian Sea needing further work; get in touch with us to find out more!
    
    - subtitle: FLOW-Lab projects
      description: >
        **Contact persons**: Bastien Queste.<br>
        
        No pre-established topics are listed at the moment. To do your project with us, reach out and we will work towards identifying a scientific question suited to you and the group's current needs.

    - subtitle: Baltic Sea projects in collaboration with the Voice of the Ocean Foundation
      description: >
        **Contact persons**: Bastien Queste, Martin Mohrmann (Voice of the Ocean Foundation).<br>
        
        Several projects are available through joint collaboration between VOTO and the University of Gothenburg, working on the Baltic glider observatories.
